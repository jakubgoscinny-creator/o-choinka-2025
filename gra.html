<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>O Choinka! 🎄 Łap Ozdoby! 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#030f05;
  overflow:hidden;
  font-family:'Nunito',Arial,sans-serif;
  touch-action:none;
}
#wrapper{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  display:flex;justify-content:center;align-items:center;
}
#gameCanvas{
  display:block;
  max-width:100vw;max-height:100vh;
  touch-action:none;
}

/* ── mute ── */
#muteBtn{
  position:absolute;
  bottom:max(env(safe-area-inset-bottom,0px) + 10px, 14px);
  right:14px;
  background:#D62828;
  border:2.5px solid #1A1A1A;
  color:#fff;font-size:18px;font-weight:900;
  width:44px;height:44px;border-radius:50%;
  cursor:pointer;z-index:30;
  display:flex;align-items:center;justify-content:center;
  box-shadow:3px 3px 0 #1A1A1A;
}

/* ── DONATE SCREEN ── */
#donateScreen{
  display:none;
  position:absolute;inset:0;
  background:#FEFDF8;
  color:#1A1A1A;
  flex-direction:column;align-items:center;justify-content:flex-start;
  padding:0 24px env(safe-area-inset-bottom,0px);
  overflow-y:auto;gap:12px;z-index:20;
}
#donateScreen.on{display:flex}

/* red header bar */
.donate-header{
  width:calc(100% + 48px);
  margin-left:-24px;
  background:#D62828;
  padding:max(env(safe-area-inset-top,0px),16px) 24px 16px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  border-bottom:3px solid #1A1A1A;
  flex-shrink:0;
}
.donate-header img{
  max-width:min(100px,30vw);max-height:60px;
  object-fit:contain;
  filter:brightness(0) invert(1);
}
.donate-header h1{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:clamp(1.3em,5.5vw,1.9em);
  color:#FFFFFF;text-align:center;text-transform:uppercase;
  letter-spacing:0.5px;margin:0;
}

#donateScreen .msg{
  font-family:'Nunito',sans-serif;font-weight:800;
  font-size:clamp(.85em,3.2vw,1em);
  text-align:center;line-height:1.65;
  max-width:360px;color:#1A1A1A;
}
.qr-card{
  background:#fff;padding:14px;border-radius:10px;
  border:2.5px solid #1A1A1A;
  box-shadow:4px 4px 0 #D62828;
  text-align:center;
}
.qr-card img{width:min(150px,46vw);height:min(150px,46vw);display:block}
.qr-card p{font-size:.75em;color:#1A1A1A;margin-top:6px;font-family:'Nunito',sans-serif;font-weight:900;}
.btn-donate{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:clamp(1em,4.2vw,1.15em);
  text-transform:uppercase;letter-spacing:0.5px;
  color:#fff;background:#D62828;
  text-decoration:none;padding:14px 32px;
  border-radius:8px;border:2.5px solid #1A1A1A;
  display:inline-block;box-shadow:4px 4px 0 #1A1A1A;
  transition:transform .1s,box-shadow .1s;
}
.btn-donate:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #1A1A1A;}
.fine{font-size:.78em;opacity:.65;text-align:center;max-width:340px;line-height:1.6;font-family:'Nunito',sans-serif;font-weight:800}
.replay-btn{
  font-size:.85em;color:#1A1A1A;
  background:none;border:2.5px solid #1A1A1A;
  border-radius:8px;
  font-family:'Nunito',sans-serif;font-weight:900;
  cursor:pointer;padding:10px 24px;
  box-shadow:3px 3px 0 #1A1A1A;
  transition:transform .1s,box-shadow .1s;
}
.replay-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #1A1A1A;}
.divider{width:80px;height:3px;background:#D62828;border-radius:2px;margin:4px 0;}
</style>
</head>
<body>

<audio id="bgMusic" preload="auto">
  <source src="muzyka.wav" type="audio/wav">
</audio>

<div id="wrapper">
  <canvas id="gameCanvas"></canvas>
  <button id="muteBtn">🔊</button>

  <div id="donateScreen">
    <div class="donate-header">
      <img src="ochoinka.png" alt="O Choinka!" onerror="this.style.display='none'">
      <h1>Dziękujemy! 🎄</h1>
    </div>
    <p class="msg">Twoja gra opowiedziała historię akcji <strong>O&nbsp;Choinka!&nbsp;2025</strong>.<br>
    Teraz możesz wesprzeć prawdziwe dzieci — każda złotówka to krok bliżej choinki!</p>
    <div class="divider"></div>
    <div class="qr-card">
      <img src="zrzutka qr.png" alt="QR" onerror="this.parentElement.innerHTML='<p style=\'padding:20px;color:#333;font-weight:900\'>📱 zrzutka.pl/ny5gz6</p>'">
      <p>zrzutka.pl/ny5gz6</p>
    </div>
    <a class="btn-donate" href="https://zrzutka.pl/ny5gz6" target="_blank" rel="noopener">💛 Wpłać na choinkę</a>
    <p class="fine">Fundacja FDDS dziękuje za każde wsparcie.<br>Razem możemy więcej! ❤️</p>
    <button class="replay-btn" id="replayBtn">↩ Zagraj jeszcze raz</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  O CHOINKA! 2025  •  Łap Ozdoby!
//  Brand redesign: O Choinka! identity system
// ═══════════════════════════════════════════════════════════

// ── BRAND TOKENS ──────────────────────────────────────────
const BR = '#D62828';   // brand red
const BG = '#1B5E20';   // brand green
const BGL= '#2E7D32';   // brand green light
const BGG= '#43A047';   // brand green bright
const BGOLD = '#C8A84B';// brand gold
const BBLK = '#1A1A1A'; // brand black
const BWHT = '#FEFDF8'; // brand white/cream
const NUN  = "'Nunito',Arial,sans-serif"; // brand font

const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const donate$ = document.getElementById('donateScreen');
const music   = document.getElementById('bgMusic');
const muteBtn = document.getElementById('muteBtn');
document.getElementById('replayBtn').addEventListener('click', resetGame);

// Virtual canvas size (portrait mobile-first)
const VW = 420, VH = 720;

// Scale + canvas sizing
function applyResize() {
  const s = Math.min(window.innerWidth / VW, window.innerHeight / VH);
  const cw = Math.round(VW * s), ch = Math.round(VH * s);
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.width  = VW;
  canvas.height = VH;
}
window.addEventListener('resize', applyResize);
applyResize();

// ── coordinate mapping ──────────────────────────────────────
function toVirtual(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) * VW / r.width,
    y: (clientY - r.top)  * VH / r.height,
  };
}

// ── music ────────────────────────────────────────────────────
music.volume = 0.55;
let musicGoing = false;

// ── song + level constants ────────────────────────────────────
const SONG_DUR  = 185.64;
const NUM_LEVELS = 6;

// ── BPM-based beat detection (no AudioContext — works on iOS) ─
const BPM = 91;
const _beats = [];
for (let t = 0.35; t < SONG_DUR + 2; t += 60 / BPM) _beats.push(t);

let beatIdx = 0, beatPulse = 0, fallbackSpawnTick = 0;

function checkBeat() {
  beatPulse = Math.max(0, beatPulse - 0.055);
  if (!musicGoing || !music.duration) return false;
  const t = music.currentTime;
  let hit = false;
  while (beatIdx < _beats.length && t >= _beats[beatIdx]) {
    beatIdx++;
    hit = true;
  }
  if (hit) { beatPulse = 1; return true; }
  return false;
}

function startMusic() {
  if (musicGoing) { music.currentTime = 0; beatIdx = 0; return; }
  musicGoing = true;
  music.loop = false;
  music.play().catch(() => {});
}
music.addEventListener('ended', () => {
  if (state === S.PLAY) triggerWin();
});
muteBtn.addEventListener('click', () => {
  music.muted = !music.muted;
  muteBtn.textContent = music.muted ? '🔇' : '🔊';
});
document.addEventListener('keydown', e => {
  if (e.key==='m'||e.key==='M') muteBtn.click();
});

// ══════════════════════════════════════════════════════════
//  STATS revealed at each level
// ══════════════════════════════════════════════════════════
const LEVEL_TIMES = Array.from({length: NUM_LEVELS}, (_,i) => SONG_DUR * (i+1) / NUM_LEVELS);

// Difficulty per level
const LEVEL_CONFIG = [
  { baseSpeed: 1.5, randSpeed: 0.5, maxOrbs: 1, interval: 105 }, // L1
  { baseSpeed: 1.9, randSpeed: 0.6, maxOrbs: 2, interval: 90  }, // L2
  { baseSpeed: 2.4, randSpeed: 0.7, maxOrbs: 2, interval: 76  }, // L3
  { baseSpeed: 2.9, randSpeed: 0.8, maxOrbs: 3, interval: 64  }, // L4
  { baseSpeed: 3.4, randSpeed: 0.9, maxOrbs: 3, interval: 54  }, // L5
  { baseSpeed: 4.0, randSpeed: 1.0, maxOrbs: 4, interval: 46  }, // L6
];

// Brand-colored stat tiles (like poster grid)
const STAT_TILE_COLORS = [BR, BG, BGOLD, BR, BG];
const STATS = [
  { icon:'🎄', num:'720+',     line1:'choinek dotarło',         line2:'do dzieci w potrzebie'       },
  { icon:'🚗', num:'4 200 km', line1:'przejechali wolontariusze', line2:'po całej Polsce'            },
  { icon:'🗺️', num:'12 miast', line1:'objęła akcja O Choinka!',  line2:'Warszawa, Poznań, Wrocław…' },
  { icon:'💝', num:'380+',     line1:'darczyńców pomogło',       line2:'od drożdżówki po 500 zł'    },
  { icon:'📺', num:'TVN Fakty',line1:'pokazały akcję —',         line2:'i ruszyła lawina wpłat!'     },
];

// ══════════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════════
const S = { START: 0, PLAY: 1, STAT: 2, WIN: 3, LOSE: 4 };
let state = S.START;

let statCard = { visible: false, idx: -1, timer: 0, phase: 'in' };
let nextStatIdx = 0;

let score = 0, lives = 3, catchTotal = 0;
let orbs = [], spawnTick = 0;
let sparkles = [], confetti = [];
let levelNum = 0;
let highScore = parseInt(localStorage.getItem('choinka_hs') || '0');
let isNewRecord = false;

// ── tree slots ────────────────────────────────────────────
const TCX = 210;
const TREE_LAYERS = [
  { py: 95,  by: 210, hw: 72  },
  { py: 170, by: 340, hw: 115 },
  { py: 280, by: 460, hw: 155 },
];
const SLOTS = [
  {x:TCX,    y:155},{x:TCX-30,y:180},{x:TCX+30,y:180},
  {x:TCX,    y:230},{x:TCX-50,y:258},{x:TCX+50,y:258},
  {x:TCX-22, y:280},{x:TCX+22,y:280},{x:TCX,   y:302},{x:TCX-55,y:310},
  {x:TCX+55, y:310},{x:TCX,   y:360},{x:TCX-80,y:360},{x:TCX+80,y:360},
  {x:TCX-40, y:388},{x:TCX+40,y:388},{x:TCX,   y:408},{x:TCX-90,y:390},
  {x:TCX+90, y:390},{x:TCX,   y:435},
].map(s=>({...s, color:null, upgraded:false}));
const TARGET = SLOTS.length; // 20

// Upgrade mode — brand-aligned deluxe colors
const DELUXE_COLORS = [BGOLD, BR, BGL, '#FFD700', '#FFFFFF', BR];
let upgradeCount = 0;

// ── player ────────────────────────────────────────────────
const PLR = { x: VW/2, y: 648, w: 82, h: 48, speed: 9 };
let keys = {left:false, right:false};
let touchX = null;

// ── particles ─────────────────────────────────────────────
const SNOW_BG = Array.from({length:50}, ()=>({
  x:Math.random()*VW, y:Math.random()*VH,
  r:Math.random()*1.5+0.5, speed:Math.random()*0.7+0.3,
  drift:(Math.random()-.5)*.3, a:Math.random()*.3+.08,
}));
const SNOW_FG = Array.from({length:30}, ()=>({
  x:Math.random()*VW, y:Math.random()*VH,
  r:Math.random()*2.5+1, speed:Math.random()*1.2+0.6,
  drift:(Math.random()-.5)*.5, a:Math.random()*.5+.2,
}));
const STAR_FIELD = Array.from({length:80}, ()=>({
  x:Math.random()*VW, y:Math.random()*(VH*.55),
  r:Math.random()*1.2+.2, phase:Math.random()*Math.PI*2,
  spd:Math.random()*.02+.008,
}));

// ── light string — brand colors ───────────────────────────
const LIGHT_COLORS = [BR, BGOLD, BGL, '#FFFFFF', BR, BGOLD, BGL, '#FFFFFF'];
const LIGHTS = Array.from({length:18}, (_, i)=>({
  x: 12 + i*(VW-24)/17,
  color: LIGHT_COLORS[i % LIGHT_COLORS.length],
  phase: Math.random()*Math.PI*2,
}));

// ── aurora ─────────────────────────────────────────────────
let auroraT = 0;

// ── orb colors — brand + classic Christmas ─────────────────
const ORB_COLORS = [BR, '#2196f3', '#9c27b0', BGOLD, '#e91e63', BGL, '#FFD700', '#00bcd4'];
const ORB_TYPES  = ['ball','star','gift','bell'];

// ══════════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
  if((e.key==='Enter'||e.key===' ')&&state===S.START) beginGame();
  if((e.key==='Enter'||e.key===' ')&&state===S.LOSE)  resetGame();
});
document.addEventListener('keyup', e => {
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
});

canvas.addEventListener('mousemove', e => {
  touchX = toVirtual(e.clientX, e.clientY).x;
});
canvas.addEventListener('mouseleave', () => touchX = null);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const v = toVirtual(e.touches[0].clientX, e.touches[0].clientY);
  touchX = v.x;
  handleTap(v);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchX = toVirtual(e.touches[0].clientX, e.touches[0].clientY).x;
}, {passive:false});
canvas.addEventListener('touchend', () => {/* keep touchX */});

canvas.addEventListener('click', e => {
  handleTap(toVirtual(e.clientX, e.clientY));
});

function inBox(p,b) { return p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h; }

const BTN = {
  start:   {x:110, y:570, w:200, h:58},
  donate:  {x:60,  y:540, w:300, h:58},
  again:   {x:110, y:615, w:200, h:44},
  retry:   {x:20,  y:548, w:182, h:56},
  donate2: {x:218, y:548, w:182, h:56},
};

function handleTap(p) {
  if(state===S.START) { if(inBox(p,BTN.start))  beginGame(); }
  if(state===S.WIN)   {
    if(inBox(p,BTN.donate)) donate$.classList.add('on');
    if(inBox(p,BTN.again))  resetGame();
  }
  if(state===S.LOSE)  {
    if(inBox(p,BTN.retry))   resetGame();
    if(inBox(p,BTN.donate2)) donate$.classList.add('on');
  }
}

// ══════════════════════════════════════════════════════════
//  FLOW
// ══════════════════════════════════════════════════════════
function beginGame() {
  state=S.PLAY; score=0; lives=3; catchTotal=0;
  orbs=[]; spawnTick=0; fallbackSpawnTick=0; sparkles=[]; confetti=[];
  SLOTS.forEach(s=>{s.color=null; s.upgraded=false;});
  PLR.x=VW/2; levelNum=0; nextStatIdx=0; isNewRecord=false;
  upgradeCount=0; beatIdx=0;
  statCard={visible:false,idx:-1,timer:0,phase:'in'};
  startMusic();
}
function resetGame() {
  donate$.classList.remove('on');
  beginGame();
}
function triggerWin() {
  state=S.WIN;
  initConfetti();
}

// ══════════════════════════════════════════════════════════
//  DRAWING UTILITIES
// ══════════════════════════════════════════════════════════
function lighten(h,d=55) {
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgb(${Math.min(255,r+d)},${Math.min(255,g+d)},${Math.min(255,b+d)})`;
}
function rgba(h,a) {
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function rr(x,y,w,h,r) {
  if(ctx.roundRect) { ctx.roundRect(x,y,w,h,r); return; }
  const R = typeof r==='number'?r:r[0];
  ctx.moveTo(x+R,y); ctx.lineTo(x+w-R,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+R);
  ctx.lineTo(x+w,y+h-R); ctx.quadraticCurveTo(x+w,y+h,x+w-R,y+h);
  ctx.lineTo(x+R,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-R);
  ctx.lineTo(x,y+R); ctx.quadraticCurveTo(x,y,x+R,y);
  ctx.closePath();
}
function starPath(x,y,R,r,pts=5,rot=0) {
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const a=rot-Math.PI/2+Math.PI/pts*i;
    const d=i%2===0?R:r;
    i===0?ctx.moveTo(x+Math.cos(a)*d,y+Math.sin(a)*d)
         :ctx.lineTo(x+Math.cos(a)*d,y+Math.sin(a)*d);
  }
  ctx.closePath();
}

// ── brand button: flat fill + bold black border + hard shadow ─
function drawBtn(b, label, gold=false) {
  ctx.save();
  // hard shadow (brand style)
  ctx.beginPath(); rr(b.x+4, b.y+5, b.w, b.h, 8);
  ctx.fillStyle = BBLK; ctx.fill();
  // main button
  ctx.beginPath(); rr(b.x, b.y, b.w, b.h, 8);
  ctx.fillStyle = gold ? BGOLD : BR;
  ctx.fill();
  ctx.strokeStyle = BBLK; ctx.lineWidth = 2.5; ctx.stroke();
  // label
  ctx.fillStyle = gold ? BBLK : '#FFFFFF';
  ctx.font = `900 ${b.h<50?15:17}px ${NUN}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, b.x+b.w/2, b.y+b.h/2);
  ctx.restore();
}

// ── orb shapes ────────────────────────────────────────────
function drawBall(x,y,r,color) {
  const g=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.08,x,y,r);
  g.addColorStop(0,lighten(color,70)); g.addColorStop(1,color);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.shadowColor=color; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;
  // cap
  ctx.fillStyle='#6a4000'; ctx.fillRect(x-3,y-r-5,6,7);
  // shine
  ctx.beginPath(); ctx.arc(x-r*.3,y-r*.28,r*.22,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.38)'; ctx.fill();
  // brand outline
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=1; ctx.stroke();
}
function drawStar(x,y,r,color,rot) {
  starPath(x,y,r,r*.4,5,rot);
  ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=1; ctx.stroke();
}
function drawGift(x,y,r,color) {
  const s=r*1.5;
  ctx.beginPath(); rr(x-s/2,y-s/2,s,s,5);
  ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=8; ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle=BBLK; ctx.lineWidth=1.5;
  ctx.beginPath(); rr(x-s/2,y-s/2,s,s,5); ctx.stroke();
  // ribbon
  ctx.strokeStyle=BGOLD; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(x,y-s/2); ctx.lineTo(x,y+s/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-s/2,y); ctx.lineTo(x+s/2,y); ctx.stroke();
  ctx.fillStyle=BGOLD; ctx.beginPath(); ctx.arc(x,y-s/2+3,5,0,Math.PI*2); ctx.fill();
}
function drawBell(x,y,r,color) {
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=8;
  ctx.beginPath();
  ctx.arc(0,-r*.1,r,Math.PI,0); ctx.lineTo(r,r*.55);
  ctx.arc(0,r*.55,r,0,Math.PI); ctx.closePath();
  ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#6a4000'; ctx.beginPath(); ctx.arc(0,r*.72,r*.28,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawDeluxe(o) {
  (o.trail||[]).forEach((p,i)=>{
    const a = (i/o.trail.length)*0.35;
    ctx.beginPath(); ctx.arc(p.x,p.y,o.r*(i/o.trail.length)*0.5,0,Math.PI*2);
    ctx.fillStyle=rgba(o.color,a); ctx.fill();
  });
  ctx.beginPath(); ctx.arc(o.x,o.y,o.r+6,0,Math.PI*2);
  ctx.fillStyle=rgba(o.color,0.15);
  ctx.shadowColor=o.color; ctx.shadowBlur=20; ctx.fill(); ctx.shadowBlur=0;
  starPath(o.x,o.y,o.r,o.r*.45,8,o.ang);
  const g=ctx.createRadialGradient(o.x-o.r*.3,o.y-o.r*.3,1,o.x,o.y,o.r);
  g.addColorStop(0,'#fff'); g.addColorStop(0.3,lighten(o.color,60)); g.addColorStop(1,o.color);
  ctx.fillStyle=g; ctx.shadowColor=o.color; ctx.shadowBlur=16; ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle=BBLK; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(o.x,o.y,o.r*.25,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fill();
}
function drawOrb(o) {
  switch(o.type){
    case 'ball':   drawBall(o.x,o.y,o.r,o.color); break;
    case 'star':   drawStar(o.x,o.y,o.r,o.color,o.ang); break;
    case 'gift':   drawGift(o.x,o.y,o.r,o.color); break;
    case 'bell':   drawBell(o.x,o.y,o.r,o.color); break;
    case 'deluxe': drawDeluxe(o); break;
  }
}

// ── background ─────────────────────────────────────────────
function drawBG() {
  // deep forest green sky
  const sky=ctx.createLinearGradient(0,0,0,VH);
  sky.addColorStop(0,'#010a02');
  sky.addColorStop(0.45,'#031508');
  sky.addColorStop(1,'#020e04');
  ctx.fillStyle=sky; ctx.fillRect(0,0,VW,VH);

  // aurora (brand green tones)
  auroraT += 0.004;
  const ax = VW*.5 + Math.sin(auroraT)*VW*.3;
  const ag = ctx.createRadialGradient(ax,0,10,ax,80,300);
  ag.addColorStop(0,`rgba(27,94,32,${.2+Math.sin(auroraT*.7)*.07})`);
  ag.addColorStop(0.5,`rgba(214,40,40,${.04+Math.sin(auroraT*.5+1)*.02})`);
  ag.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ag; ctx.fillRect(0,0,VW,VH*.45);

  // stars
  STAR_FIELD.forEach(s=>{
    s.phase+=s.spd;
    const a=.2+.5*Math.abs(Math.sin(s.phase));
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill();
  });

  // ground snow (brand-tinted)
  ctx.fillStyle='#E0EEE0';
  ctx.beginPath(); ctx.ellipse(VW/2,VH+4,VW*.7,38,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=BBLK; ctx.lineWidth=1;
  ctx.beginPath(); ctx.ellipse(VW/2,VH+4,VW*.7,38,0,0,Math.PI); ctx.stroke();

  // brand corner tiles (top-left red, top-right green)
  _drawCornerTile(0, 0, BR);
  _drawCornerTile(VW-34, 0, BG);
}
function _drawCornerTile(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 34, 34);
  ctx.strokeStyle = BBLK; ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, 34, 34);
  // mini tree icon
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.moveTo(x+17,y+5); ctx.lineTo(x+8,y+24); ctx.lineTo(x+26,y+24); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillRect(x+15,y+24,4,6);
}

function drawSnow() {
  [...SNOW_BG,...SNOW_FG].forEach(s=>{
    s.y+=s.speed; s.x+=s.drift;
    if(s.y>VH+4){ s.y=-4; s.x=Math.random()*VW; }
    if(s.x>VW) s.x=0; if(s.x<0) s.x=VW;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(220,240,220,${s.a})`; ctx.fill();
  });
}

// ── light string — brand colors ───────────────────────────
function drawLights() {
  const now=performance.now()/1000;
  ctx.strokeStyle='rgba(40,25,10,.7)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  LIGHTS.forEach((l,i)=>{
    const y=24+Math.sin(i*.8)*.5;
    i===0?ctx.moveTo(l.x,y):ctx.lineTo(l.x,y);
  }); ctx.stroke();

  LIGHTS.forEach((l,i)=>{
    const twink=.5+.5*Math.sin(now*2.2+l.phase);
    const pulse = beatPulse > 0 ? 1 + beatPulse * 0.7 : 1;
    const r = 5 * pulse;
    ctx.beginPath(); ctx.arc(l.x,24+Math.sin(i*.8)*.5,r,0,Math.PI*2);
    ctx.fillStyle=l.color; ctx.shadowColor=l.color; ctx.shadowBlur=(twink+beatPulse)*16;
    ctx.fill(); ctx.shadowBlur=0;
    // white centre dot when bright
    if(twink > 0.7){
      ctx.beginPath(); ctx.arc(l.x,24+Math.sin(i*.8)*.5,r*.4,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fill();
    }
  });
}

// ── tree — brand green + bold black outlines (like logo) ──
function drawTree(lit=false) {
  const now=performance.now()/1000;

  TREE_LAYERS.forEach(L=>{
    // drop shadow for depth
    ctx.beginPath();
    ctx.moveTo(TCX+3, L.py+4);
    ctx.lineTo(TCX-L.hw+3, L.by+3); ctx.lineTo(TCX+L.hw+3, L.by+3);
    ctx.closePath();
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fill();

    // main layer — flat brand green
    ctx.beginPath();
    ctx.moveTo(TCX, L.py); ctx.lineTo(TCX-L.hw, L.by); ctx.lineTo(TCX+L.hw, L.by);
    ctx.closePath();
    ctx.fillStyle = lit ? BGL : BG;
    if(lit){ ctx.shadowColor=BGG; ctx.shadowBlur=18; }
    ctx.fill(); ctx.shadowBlur=0;
    // bold black outline — brand signature
    ctx.strokeStyle=BBLK; ctx.lineWidth=2; ctx.stroke();

    // inner lighter chevron (like logo)
    const iw = L.hw * 0.55, iy = L.py + (L.by-L.py)*.2;
    ctx.beginPath();
    ctx.moveTo(TCX, iy);
    ctx.lineTo(TCX-iw, L.by - (L.by-L.py)*.05);
    ctx.lineTo(TCX+iw, L.by - (L.by-L.py)*.05);
    ctx.closePath();
    ctx.fillStyle=lit ? BGG : BGL;
    ctx.globalAlpha=0.45; ctx.fill(); ctx.globalAlpha=1;
  });

  // trunk — brand brown
  ctx.fillStyle='#5c3112';
  ctx.fillRect(TCX-13,460,26,58);
  ctx.strokeStyle=BBLK; ctx.lineWidth=2;
  ctx.strokeRect(TCX-13,460,26,58);

  // top star — brand gold
  const starLit=catchTotal>=TARGET;
  starPath(TCX,TREE_LAYERS[0].py-18,22,9,5,starLit?now*.8:0);
  ctx.fillStyle=starLit?BGOLD:'#3a2800';
  if(starLit){ ctx.shadowColor=BGOLD; ctx.shadowBlur=24; }
  ctx.fill(); ctx.shadowBlur=0;
  if(starLit || catchTotal > 0){
    ctx.strokeStyle=starLit?BBLK:'rgba(0,0,0,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  // placed ornaments
  SLOTS.forEach((sl,i)=>{
    if(!sl.color)return;
    const r = sl.upgraded ? 12 : 8;
    const g2=ctx.createRadialGradient(sl.x-r*.3,sl.y-r*.3,1,sl.x,sl.y,r);
    g2.addColorStop(0,lighten(sl.color,55)); g2.addColorStop(1,sl.color);
    if(sl.upgraded){
      ctx.beginPath(); ctx.arc(sl.x,sl.y,r+4,0,Math.PI*2);
      ctx.strokeStyle=BGOLD; ctx.lineWidth=1.5;
      ctx.shadowColor=BGOLD; ctx.shadowBlur=10; ctx.stroke(); ctx.shadowBlur=0;
      const tw=.4+.6*Math.abs(Math.sin(now*2.5+i*.6));
      ctx.beginPath(); ctx.arc(sl.x,sl.y,r+8,0,Math.PI*2);
      ctx.fillStyle=rgba(sl.color,tw*.25); ctx.fill();
    }
    ctx.beginPath(); ctx.arc(sl.x,sl.y,r,0,Math.PI*2);
    ctx.fillStyle=g2; ctx.shadowColor=sl.color; ctx.shadowBlur=sl.upgraded?18:(lit?14:7);
    ctx.fill(); ctx.shadowBlur=0;
    // small black outline on ornament
    ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=1; ctx.stroke();
    if(lit && !sl.upgraded){
      const tw=.3+.7*Math.abs(Math.sin(now*2+i*.7));
      ctx.beginPath(); ctx.arc(sl.x,sl.y,12,0,Math.PI*2);
      ctx.fillStyle=rgba(sl.color,tw*.2); ctx.fill();
    }
  });

  // festoon lights (when lit) — brand colors
  if(lit){
    const festC=[BR,BGOLD,BGL,'#fff',BR,BGOLD];
    for(let i=0;i<12;i++){
      const t=now*1.8+i*.5, fc=festC[i%festC.length];
      const lx=TCX+Math.sin(i*1.5)*(35+i*8), ly=160+i*24;
      ctx.beginPath(); ctx.arc(lx,ly,4,0,Math.PI*2);
      ctx.fillStyle=fc; ctx.shadowColor=fc; ctx.shadowBlur=8+5*Math.abs(Math.sin(t));
      ctx.fill(); ctx.shadowBlur=0;
    }
  }
}

// ── sparkles ──────────────────────────────────────────────
function burst(x,y,color,n=14) {
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i, sp=2+Math.random()*3.5;
    sparkles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color});
  }
}
function tickSparkles() {
  sparkles=sparkles.filter(e=>e.life>0);
  sparkles.forEach(e=>{
    e.x+=e.vx; e.y+=e.vy; e.vy+=.1; e.life-=.04;
    ctx.beginPath(); ctx.arc(e.x,e.y,4,0,Math.PI*2);
    ctx.fillStyle=rgba(e.color,e.life); ctx.shadowColor=e.color; ctx.shadowBlur=8;
    ctx.fill(); ctx.shadowBlur=0;
  });
}

const CONF_COLORS = [BR, BG, BGOLD, '#FFFFFF', BR, BGL, BGOLD, '#FFFFFF'];
function initConfetti() {
  confetti=Array.from({length:70},()=>({
    x:Math.random()*VW, y:-20-Math.random()*80,
    vx:(Math.random()-.5)*4, vy:2+Math.random()*2,
    r:4+Math.random()*6, rot:Math.random()*Math.PI*2, spin:(Math.random()-.5)*.2,
    color:CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)],

}
function tickConfetti() {
  confetti.forEach(c=>{
    c.x+=c.vx; c.y+=c.vy; c.rot+=c.spin;
    if(c.y>VH+20) c.y=-20;
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.fillStyle=c.color;
    // mix rectangles and squares
    ctx.fillRect(-c.r/2,-c.r/4,c.r,c.r/2);
    ctx.restore();
  });
}

// ── stat reveal — brand poster tile ───────────────────────
function triggerStat(idx) {
  statCard={visible:true,idx,timer:0,phase:'in'};
}
function tickStatCard() {
  if(!statCard.visible) return;
  const HOLD=2.8, FADE=.35;
  statCard.timer += 1/60;

  let alpha;
  if(statCard.phase==='in'){
    alpha=statCard.timer/FADE;
    if(statCard.timer>=FADE){ statCard.phase='hold'; statCard.timer=0; alpha=1; }
  } else if(statCard.phase==='hold'){
    alpha=1;
    if(statCard.timer>=HOLD){ statCard.phase='out'; statCard.timer=0; }
  } else {
    alpha=1-statCard.timer/FADE;
    if(statCard.timer>=FADE){ statCard.visible=false; return; }
  }

  const s=STATS[statCard.idx];
  const tileColor=STAT_TILE_COLORS[statCard.idx];
  const isGold=(tileColor===BGOLD);
  const cx=VW/2, cy=VH*.48;
  const w=330, h=195;

  ctx.save(); ctx.globalAlpha=Math.min(1,alpha);

  // hard shadow (brand style)
  ctx.beginPath(); rr(cx-w/2+5,cy-h/2+6,w,h,12);
  ctx.fillStyle=BBLK; ctx.fill();

  // main tile — flat brand color
  ctx.beginPath(); rr(cx-w/2,cy-h/2,w,h,12);
  ctx.fillStyle=tileColor; ctx.fill();
  ctx.strokeStyle=BBLK; ctx.lineWidth=2.5; ctx.stroke();

  // white top accent strip
  ctx.beginPath(); rr(cx-w/2,cy-h/2,w,52,[12,12,0,0]);
  ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fill();

  // emoji
  ctx.font='36px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(s.icon, cx, cy-h/2+28);

  // stat number — bold, white (or black on gold)
  ctx.font=`900 38px ${NUN}`;
  ctx.fillStyle=isGold?BBLK:'#FFFFFF';
  ctx.textBaseline='alphabetic';
  ctx.shadowColor=isGold?'rgba(0,0,0,0.2)':'rgba(0,0,0,0.3)';
  ctx.shadowBlur=6;
  ctx.fillText(s.num, cx, cy+12); ctx.shadowBlur=0;

  // lines
  ctx.font=`800 14px ${NUN}`;
  ctx.fillStyle=isGold?'rgba(0,0,0,.75)':'rgba(255,255,255,.9)';
  ctx.fillText(s.line1, cx, cy+34);
  ctx.fillText(s.line2, cx, cy+54);

  // progress dots (white with black border)
  const total=STATS.length, dotR=6, spacing=22;
  const startX=cx-(total-1)*spacing/2;
  for(let i=0;i<total;i++){
    ctx.beginPath(); ctx.arc(startX+i*spacing,cy+h/2-20,dotR,0,Math.PI*2);
    ctx.fillStyle=i<=statCard.idx?'#FFFFFF':'rgba(255,255,255,.25)'; ctx.fill();
    if(i<=statCard.idx){
      ctx.strokeStyle=BBLK; ctx.lineWidth=1.5; ctx.stroke();
    }
  }

  ctx.restore();
}

// ── game screen ───────────────────────────────────────────
function drawPlay() {
  drawBG(); drawSnow(); drawTree(false); drawLights();

  // level transitions
  if(musicGoing && !statCard.visible) {
    const ct=music.currentTime;
    if(nextStatIdx < STATS.length && ct >= LEVEL_TIMES[nextStatIdx]) {
      triggerStat(nextStatIdx);
      levelNum = nextStatIdx + 1;
      nextStatIdx++;
    }
  }

  // spawn — beat-driven + fallback
  const cfg = LEVEL_CONFIG[Math.min(levelNum, LEVEL_CONFIG.length-1)];
  const beat = checkBeat();
  if (beat && orbs.length < cfg.maxOrbs) { spawnOrb(); fallbackSpawnTick = 0; }
  fallbackSpawnTick++;
  if (fallbackSpawnTick > cfg.interval * 2) { spawnOrb(); fallbackSpawnTick = 0; }

  // beat pulse flash — brand red tint
  if (beatPulse > 0.01) {
    ctx.fillStyle = `rgba(214,40,40,${beatPulse * 0.05})`;
    ctx.fillRect(0, 0, VW, VH);
  }

  // move player
  if(touchX !== null){
    const target = Math.max(PLR.w/2, Math.min(VW-PLR.w/2, touchX));
    PLR.x += (target-PLR.x)*.22;
  } else {
    if(keys.left)  PLR.x=Math.max(PLR.w/2,    PLR.x-PLR.speed);
    if(keys.right) PLR.x=Math.min(VW-PLR.w/2, PLR.x+PLR.speed);
  }

  // move & collide orbs
  const isUpgrade = catchTotal >= TARGET;
  orbs=orbs.filter(o=>{
    if(o.type==='deluxe'){
      if(!o.trail) o.trail=[];
      o.trail.push({x:o.x, y:o.y});
      if(o.trail.length > 10) o.trail.shift();
    }
    o.y+=o.speed; o.ang+=o.spin;
    const caught = o.y+o.r>=PLR.y-PLR.h/2 && o.y-o.r<=PLR.y+PLR.h/2
                && o.x>=PLR.x-PLR.w/2-o.r  && o.x<=PLR.x+PLR.w/2+o.r;
    if(caught){
      burst(o.x,o.y,o.color, o.type==='deluxe'?20:14);
      if(!isUpgrade){
        if(catchTotal<TARGET){ const sl=SLOTS[catchTotal]; if(sl) sl.color=o.color; }
      } else {
        const pool = SLOTS.filter(s=>s.color && !s.upgraded);
        const target = pool.length>0
          ? pool[Math.floor(Math.random()*pool.length)]
          : SLOTS[Math.floor(Math.random()*TARGET)];
        target.color = o.color;
        target.upgraded = true;
        upgradeCount++;
      }
      catchTotal++;
      return false;
    }
    if(o.y>VH+30){
      if(!isUpgrade){
        lives--;
        if(lives<=0){
          if(catchTotal > highScore){
            highScore=catchTotal;
            localStorage.setItem('choinka_hs',String(catchTotal));
            isNewRecord=true;
          }
          state=S.LOSE;
        }
      }
      return false;
    }
    return true;
  });

  orbs.forEach(drawOrb);
  tickSparkles();

  if (beatPulse > 0) {
    const bounce = Math.sin(beatPulse * Math.PI) * 5;
    ctx.save(); ctx.translate(0, -bounce);
    drawPlayer(); ctx.restore();
  } else {
    drawPlayer();
  }
  drawHUD();
  tickStatCard();
}

function spawnOrb() {
  const cfg = LEVEL_CONFIG[Math.min(levelNum, LEVEL_CONFIG.length-1)];
  const isUpgrade = catchTotal >= TARGET;
  const maxOnScreen = isUpgrade ? cfg.maxOrbs + 1 : cfg.maxOrbs;
  if(orbs.length >= maxOnScreen) return;

  if (isUpgrade) {
    orbs.push({
      x: 30+Math.random()*(VW-60), y: -30,
      r: 22 + Math.random()*6,
      speed: cfg.baseSpeed * 1.1 + Math.random()*cfg.randSpeed,
      color: DELUXE_COLORS[Math.floor(Math.random()*DELUXE_COLORS.length)],
      type: 'deluxe',
      ang: Math.random()*Math.PI*2, spin: 0.04 + Math.random()*0.04,
      trail: [],
    });
  } else {
    orbs.push({
      x: 30+Math.random()*(VW-60), y: -28,
      r: 16+Math.random()*9,
      speed: cfg.baseSpeed + Math.random()*cfg.randSpeed,
      color: ORB_COLORS[Math.floor(Math.random()*ORB_COLORS.length)],
      type:  ORB_TYPES[Math.floor(Math.random()*ORB_TYPES.length)],
      ang: Math.random()*Math.PI*2, spin:(Math.random()-.5)*.08,
    });
  }
}

// ── win screen ────────────────────────────────────────────
function drawWin() {
  drawBG(); drawSnow(); tickConfetti(); drawTree(true); drawLights(); tickSparkles();

  const px=22, py=VH*.5, pw=VW-44, ph=VH*.46;
  drawCard(px, py, pw, ph, BG, 54, 14);

  ctx.textAlign='center';
  // green bar text
  ctx.font=`900 22px ${NUN}`; ctx.fillStyle='#FFFFFF'; ctx.textBaseline='middle';
  ctx.fillText('🎉 BRAWO!', VW/2, py+28);

  ctx.font=`900 22px ${NUN}`; ctx.fillStyle=BG; ctx.textBaseline='alphabetic';
  ctx.fillText('Choinka udekorowana!', VW/2, py+82);

  ctx.font=`800 13px ${NUN}`; ctx.fillStyle='#333';
  ctx.fillText('Dzieci czekają na prawdziwe choinki.', VW/2, py+106);
  ctx.fillText('Możesz pomóc — to się naprawdę stanie!', VW/2, py+124);

  drawBtn(BTN.donate, '💛 Wesprzyj Akcję O Choinka!', true);

  ctx.font=`800 12px ${NUN}`; ctx.fillStyle='rgba(60,60,60,.65)';
  ctx.textBaseline='middle';
  ctx.fillText('lub zagraj jeszcze raz ↩', VW/2, BTN.again.y+BTN.again.h/2);
}

// ── lose screen ───────────────────────────────────────────
function drawLose() {
  drawBG(); drawSnow(); drawTree(false); drawLights();

  const px=20, py=VH*.26, pw=VW-40, ph=VH*.6;
  const lvlReached = Math.min(levelNum+1, NUM_LEVELS);
  drawCard(px, py, pw, ph, BR, 52, 14);

  ctx.textAlign='center';
  // red bar text
  ctx.font=`900 14px ${NUN}`; ctx.fillStyle='#FFFFFF'; ctx.textBaseline='middle';
  ctx.fillText(`POZIOM ${lvlReached} z 6`, VW/2, py+26);

  ctx.font=`900 34px ${NUN}`; ctx.fillStyle=BR; ctx.textBaseline='alphabetic';
  ctx.fillText(`Poziom ${lvlReached}!`, VW/2, py+94);

  ctx.font=`800 16px ${NUN}`; ctx.fillStyle=BBLK;
  ctx.fillText(`Złapałeś ${catchTotal} ozdób 🎁`, VW/2, py+124);

  if(isNewRecord && catchTotal > 0){
    // gold tile for record
    ctx.beginPath(); rr(VW/2-120,py+134,240,32,6);
    ctx.fillStyle=BGOLD; ctx.fill();
    ctx.strokeStyle=BBLK; ctx.lineWidth=2; ctx.stroke();
    ctx.font=`900 14px ${NUN}`; ctx.fillStyle=BBLK; ctx.textBaseline='middle';
    ctx.fillText(`🏆 NOWY REKORD! ${catchTotal} ozdób`, VW/2, py+150);
  } else if(highScore > 0){
    ctx.font=`800 13px ${NUN}`; ctx.fillStyle='#555'; ctx.textBaseline='alphabetic';
    ctx.fillText(`Twój rekord: ${highScore} ozdób`, VW/2, py+158);
  }

  ctx.font=`800 13px ${NUN}`; ctx.fillStyle='#444'; ctx.textBaseline='alphabetic';
  ctx.fillText('Dzieci nadal czekają na choinki 💪', VW/2, py+188);
  ctx.fillText('Pobij rekord albo wesprzyj akcję!', VW/2, py+206);

  drawBtn(BTN.retry,   '🔄 Pobij rekord');
  drawBtn(BTN.donate2, '💛 Wesprzyj akcję', true);
}

// ══════════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════════
function loop() {
  ctx.clearRect(0,0,VW,VH);
  ctx.textBaseline='alphabetic';
  switch(state){
    case S.START: drawStart(); break;
    case S.PLAY:  drawPlay();  break;
    case S.WIN:   drawWin();   break;
    case S.LOSE:  drawLose();  break;
  }
  requestAnimationFrame(loop);
}

loop();
</script>
