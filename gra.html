<script>
// ═══════════════════════════════════════════════════════════
//  O CHOINKA! 2025  •  Łap Ozdoby!
//  mobile-first portrait canvas game
// ═══════════════════════════════════════════════════════════

const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const donate$ = document.getElementById('donateScreen');
const music   = document.getElementById('bgMusic');
const muteBtn = document.getElementById('muteBtn');
document.getElementById('replayBtn').addEventListener('click', resetGame);

// Virtual canvas size (portrait mobile-first)
const VW = 420, VH = 720;

// Scale factor + canvas sizing
let cx_off = 0, cy_off = 0; // css offset (for correct click mapping)
function applyResize() {
  const s = Math.min(window.innerWidth / VW, window.innerHeight / VH);
  const cw = Math.round(VW * s), ch = Math.round(VH * s);
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.width  = VW;   // draw at virtual resolution, browser scales via CSS
  canvas.height = VH;
}
window.addEventListener('resize', applyResize);
applyResize();

// ── coordinate mapping ──────────────────────────────────────
function toVirtual(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) * VW / r.width,
    y: (clientY - r.top)  * VH / r.height,
  };
}

// ── music ───────────────────────────────────────────────────
music.volume = 0.55;
let musicGoing = false;

// ── Web Audio beat detection ─────────────────────────────────
let audioCtx = null, analyser = null, beatData = null;
let lastBeatTime = 0, beatPulse = 0, bassAvg = 80;
const BEAT_COOLDOWN = 280; // ms — min gap between spawns (~214 BPM max)

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaElementSource(music);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.72;
    src.connect(analyser);
    analyser.connect(audioCtx.destination);
    beatData = new Uint8Array(analyser.frequencyBinCount);
  } catch(e) { console.warn('AudioContext failed:', e); }
}

// Returns true on kick/bass beat, updates beatPulse
function checkBeat() {
  beatPulse = Math.max(0, beatPulse - 0.055);
  if (!analyser) return false;
  analyser.getByteFrequencyData(beatData);
  // bins 0-6 cover ~0-560 Hz at 48kHz/512 — kick + bass
  const bass = (beatData[0]+beatData[1]+beatData[2]+beatData[3]+beatData[4]+beatData[5]+beatData[6])/7;
  bassAvg = bassAvg * 0.94 + bass * 0.06; // slow-moving average
  const now = performance.now();
  if (bass > Math.max(bassAvg * 1.38, 85) && now - lastBeatTime > BEAT_COOLDOWN) {
    lastBeatTime = now;
    beatPulse = 1;
    return true;
  }
  return false;
}

// Fallback: if no beat detected for >1.5s, use timed spawn
let fallbackSpawnTick = 0;

function startMusic() {
  if (musicGoing) { music.currentTime = 0; return; }
  musicGoing = true;
  music.loop = false;
  initAudio();
  music.play().catch(() => {});
}
music.addEventListener('ended', () => {
  if (state === S.PLAY) triggerWin();
});
muteBtn.addEventListener('click', () => {
  music.muted = !music.muted;
  muteBtn.textContent = music.muted ? '🔇' : '🔊';
});
document.addEventListener('keydown', e => {
  if (e.key==='m'||e.key==='M') muteBtn.click();
});

// ══════════════════════════════════════════════════════════
//  STATS revealed at each level (5 reveals + final)
// ══════════════════════════════════════════════════════════
const SONG_DUR = 185.64; // seconds (measured from WAV header)
const NUM_LEVELS = 6;
const LEVEL_TIMES = Array.from({length: NUM_LEVELS}, (_,i) => SONG_DUR * (i+1) / NUM_LEVELS);
// [30.9, 61.9, 92.8, 123.8, 154.7, 185.6]

// Difficulty per level — level 1 very easy, gradual ramp
const LEVEL_CONFIG = [
  { baseSpeed: 1.5, randSpeed: 0.5, maxOrbs: 1, interval: 105 }, // L1 — easy
  { baseSpeed: 1.9, randSpeed: 0.6, maxOrbs: 2, interval: 90  }, // L2
  { baseSpeed: 2.4, randSpeed: 0.7, maxOrbs: 2, interval: 76  }, // L3
  { baseSpeed: 2.9, randSpeed: 0.8, maxOrbs: 3, interval: 64  }, // L4
  { baseSpeed: 3.4, randSpeed: 0.9, maxOrbs: 3, interval: 54  }, // L5
  { baseSpeed: 4.0, randSpeed: 1.0, maxOrbs: 4, interval: 46  }, // L6 — hard
];

const STATS = [
  {
    icon: '🎄', num: '720+',
    line1: 'choinek dotarło', line2: 'do dzieci w potrzebie',
    color: '#43c96f',
  },
  {
    icon: '🚗', num: '4 200 km',
    line1: 'przejechali wolontariusze', line2: 'po całej Polsce',
    color: '#e63946',
  },
  {
    icon: '🗺️', num: '12 miast',
    line1: 'objęła akcja O Choinka!', line2: 'Warszawa, Poznań, Wrocław i więcej…',
    color: '#42a5f5',
  },
  {
    icon: '💝', num: '380+',
    line1: 'darczyńców pomogło', line2: 'od drożdżówki po 500 zł',
    color: '#ffd700',
  },
  {
    icon: '📺', num: 'TVN Fakty',
    line1: 'pokazały akcję —', line2: 'i ruszyła lawina wpłat!',
    color: '#ce93d8',
  },
];

// ══════════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════════
const S = { START: 0, PLAY: 1, STAT: 2, WIN: 3, LOSE: 4 };
let state = S.START;

// ── stat reveal ─────────────────────────────────────────────
let statCard = {
  visible: false,
  idx: -1,
  timer: 0,
  phase: 'in', // in / hold / out
};
let nextStatIdx = 0; // which stat to show next

// ── gameplay vars ────────────────────────────────────────────
let score = 0, lives = 3, catchTotal = 0;
let orbs = [], spawnTick = 0;
let sparkles = [], confetti = [];
let levelNum = 0; // current level (0-5)
let highScore = parseInt(localStorage.getItem('choinka_hs') || '0');
let isNewRecord = false;

// ── tree slots ───────────────────────────────────────────────
const TCX = 210;
const TREE_LAYERS = [
  { py: 95,  by: 210, hw: 72  },
  { py: 170, by: 340, hw: 115 },
  { py: 280, by: 460, hw: 155 },
];
const SLOTS = [
  // top (3)
  {x:TCX,    y:155},{x:TCX-30,y:180},{x:TCX+30,y:180},
  // mid (7)
  {x:TCX,    y:230},{x:TCX-50,y:258},{x:TCX+50,y:258},
  {x:TCX-22, y:280},{x:TCX+22,y:280},{x:TCX,   y:302},{x:TCX-55,y:310},
  // bot (10)
  {x:TCX+55, y:310},{x:TCX,   y:360},{x:TCX-80,y:360},{x:TCX+80,y:360},
  {x:TCX-40, y:388},{x:TCX+40,y:388},{x:TCX,   y:408},{x:TCX-90,y:390},
  {x:TCX+90, y:390},{x:TCX,   y:435},
].map(s=>({...s,color:null}));
const TARGET = SLOTS.length; // 20

// ── player ────────────────────────────────────────────────────
const PLR = { x: VW/2, y: 648, w: 82, h: 48, speed: 9 };
let keys = {left:false, right:false};
let touchX = null;

// ── particles ────────────────────────────────────────────────
const SNOW_BG = Array.from({length:50}, ()=>({
  x:Math.random()*VW, y:Math.random()*VH,
  r:Math.random()*1.5+0.5, speed:Math.random()*0.7+0.3,
  drift:(Math.random()-.5)*.3, a:Math.random()*.35+.1,
}));
const SNOW_FG = Array.from({length:30}, ()=>({
  x:Math.random()*VW, y:Math.random()*VH,
  r:Math.random()*2.5+1, speed:Math.random()*1.2+0.6,
  drift:(Math.random()-.5)*.5, a:Math.random()*.6+.25,
}));
const STAR_FIELD = Array.from({length:80}, ()=>({
  x:Math.random()*VW, y:Math.random()*(VH*.55),
  r:Math.random()*1.2+.2, phase:Math.random()*Math.PI*2,
  spd:Math.random()*.02+.008,
}));

// ── light string (top decoration) ────────────────────────────
const LIGHT_COLORS = ['#e63946','#ffd700','#43c96f','#42a5f5','#ce93d8','#ff9800'];
const LIGHTS = Array.from({length:18}, (_, i)=>({
  x: 12 + i*(VW-24)/17,
  color: LIGHT_COLORS[i % LIGHT_COLORS.length],
  phase: Math.random()*Math.PI*2,
}));

// ── aurora state ──────────────────────────────────────────────
let auroraT = 0;

// ── orb config ────────────────────────────────────────────────
const ORB_COLORS = ['#e63946','#2196f3','#9c27b0','#ff9800','#e91e63','#43a047','#ffd700','#00bcd4'];
const ORB_TYPES  = ['ball','star','gift','bell'];

// ══════════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
  if((e.key==='Enter'||e.key===' ')&&state===S.START) beginGame();
  if((e.key==='Enter'||e.key===' ')&&state===S.LOSE)  resetGame();
});
document.addEventListener('keyup', e => {
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
});

canvas.addEventListener('mousemove', e => {
  touchX = toVirtual(e.clientX, e.clientY).x;
});
canvas.addEventListener('mouseleave', () => touchX = null);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const v = toVirtual(e.touches[0].clientX, e.touches[0].clientY);
  touchX = v.x;
  handleTap(v);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchX = toVirtual(e.touches[0].clientX, e.touches[0].clientY).x;
}, {passive:false});
canvas.addEventListener('touchend', () => {/* keep touchX */});

canvas.addEventListener('click', e => {
  handleTap(toVirtual(e.clientX, e.clientY));
});

function inBox(p,b) { return p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h; }

// button hit-boxes (virtual coords)
const BTN = {
  start:   {x:110, y:570, w:200, h:58},
  donate:  {x:60,  y:540, w:300, h:58},
  again:   {x:110, y:615, w:200, h:44},
  retry:   {x:20,  y:548, w:182, h:56}, // lose screen — left
  donate2: {x:218, y:548, w:182, h:56}, // lose screen — right
};

function handleTap(p) {
  if(state===S.START) { if(inBox(p,BTN.start))  beginGame(); }
  if(state===S.WIN)   {
    if(inBox(p,BTN.donate)) donate$.classList.add('on');
    if(inBox(p,BTN.again))  resetGame();
  }
  if(state===S.LOSE)  {
    if(inBox(p,BTN.retry))   resetGame();
    if(inBox(p,BTN.donate2)) donate$.classList.add('on');
  }
}

// ══════════════════════════════════════════════════════════
//  FLOW
// ══════════════════════════════════════════════════════════
function beginGame() {
  state=S.PLAY; score=0; lives=3; catchTotal=0;
  orbs=[]; spawnTick=0; fallbackSpawnTick=0; sparkles=[]; confetti=[];
  SLOTS.forEach(s=>s.color=null);
  PLR.x=VW/2; levelNum=0; nextStatIdx=0; isNewRecord=false;
  statCard={visible:false,idx:-1,timer:0,phase:'in'};
  startMusic();
}
function resetGame() {
  donate$.classList.remove('on');
  beginGame();
}
function triggerWin() {
  state=S.WIN;
  initConfetti();
}

// ══════════════════════════════════════════════════════════
//  DRAWING UTILITIES
// ══════════════════════════════════════════════════════════
function lighten(h,d=55) {
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgb(${Math.min(255,r+d)},${Math.min(255,g+d)},${Math.min(255,b+d)})`;
}
function rgba(h,a) {
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// rounded rect helper (canvas has it natively in modern browsers, polyfill for older)
function rr(x,y,w,h,r) {
  if(ctx.roundRect) { ctx.roundRect(x,y,w,h,r); return; }
  const R = typeof r==='number'?r:r[0];
  ctx.moveTo(x+R,y); ctx.lineTo(x+w-R,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+R);
  ctx.lineTo(x+w,y+h-R); ctx.quadraticCurveTo(x+w,y+h,x+w-R,y+h);
  ctx.lineTo(x+R,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-R);
  ctx.lineTo(x,y+R); ctx.quadraticCurveTo(x,y,x+R,y);
  ctx.closePath();
}

function starPath(x,y,R,r,pts=5,rot=0) {
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const a=rot-Math.PI/2+Math.PI/pts*i;
    const d=i%2===0?R:r;
    i===0?ctx.moveTo(x+Math.cos(a)*d,y+Math.sin(a)*d)
         :ctx.lineTo(x+Math.cos(a)*d,y+Math.sin(a)*d);
  }
  ctx.closePath();
}

function drawBall(x,y,r,color) {
  const g=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.08,x,y,r);
  g.addColorStop(0,lighten(color,70)); g.addColorStop(1,color);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.shadowColor=color; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#a07800'; ctx.fillRect(x-3,y-r-6,6,8);
  ctx.beginPath(); ctx.arc(x-r*.3,y-r*.28,r*.22,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.38)'; ctx.fill();
}
function drawStar(x,y,r,color,rot) {
  starPath(x,y,r,r*.4,5,rot);
  ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=14; ctx.fill(); ctx.shadowBlur=0;
}
function drawGift(x,y,r,color) {
  const s=r*1.5;
  ctx.beginPath(); rr(x-s/2,y-s/2,s,s,5);
  ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(x,y-s/2); ctx.lineTo(x,y+s/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-s/2,y); ctx.lineTo(x+s/2,y); ctx.stroke();
  ctx.fillStyle='#ffd700'; ctx.beginPath(); ctx.arc(x,y-s/2+3,5,0,Math.PI*2); ctx.fill();
}
function drawBell(x,y,r,color) {
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=10;
  ctx.beginPath();
  ctx.arc(0,-r*.1,r,Math.PI,0); ctx.lineTo(r,r*.55);
  ctx.arc(0,r*.55,r,0,Math.PI); ctx.closePath();
  ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#a07800'; ctx.beginPath(); ctx.arc(0,r*.72,r*.28,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawOrb(o) {
  switch(o.type){
    case 'ball': drawBall(o.x,o.y,o.r,o.color); break;
    case 'star': drawStar(o.x,o.y,o.r,o.color,o.ang); break;
    case 'gift': drawGift(o.x,o.y,o.r,o.color); break;
    case 'bell': drawBell(o.x,o.y,o.r,o.color); break;
  }
}

// ── button ────────────────────────────────────────────────────
function drawBtn(b, label, gold=false) {
  ctx.save();
  ctx.beginPath(); rr(b.x,b.y,b.w,b.h,b.h/2);
  const g=ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
  if(gold){ g.addColorStop(0,'#ffd700'); g.addColorStop(1,'#e6a800'); }
  else     { g.addColorStop(0,'#c41e3a'); g.addColorStop(1,'#8f1228'); }
  ctx.fillStyle=g; ctx.shadowColor=gold?'#ffd700':'#e63946'; ctx.shadowBlur=22; ctx.fill();
  ctx.strokeStyle=gold?'rgba(255,255,255,.35)':'rgba(255,215,0,.4)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle=gold?'#1a1a1a':'#fff';
  ctx.font=`bold ${b.h<50?15:17}px 'IM Fell English',Georgia,serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label, b.x+b.w/2, b.y+b.h/2);
  ctx.restore();
}

// ── background ────────────────────────────────────────────────
function drawBG() {
  // base sky gradient
  const sky=ctx.createLinearGradient(0,0,0,VH);
  sky.addColorStop(0,'#030812'); sky.addColorStop(0.5,'#071530'); sky.addColorStop(1,'#061a0d');
  ctx.fillStyle=sky; ctx.fillRect(0,0,VW,VH);

  // aurora borealis
  auroraT += 0.004;
  const ax = VW*.5 + Math.sin(auroraT)*VW*.3;
  const ag = ctx.createRadialGradient(ax,0,10,ax,80,280);
  ag.addColorStop(0,`rgba(30,180,100,${.12+Math.sin(auroraT*.7)*.06})`);
  ag.addColorStop(0.5,`rgba(20,60,160,${.08+Math.sin(auroraT*.5+1)*.04})`);
  ag.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ag; ctx.fillRect(0,0,VW,VH*.45);

  // stars
  STAR_FIELD.forEach(s=>{
    s.phase+=s.spd;
    const a=.3+.7*Math.abs(Math.sin(s.phase));
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill();
  });

  // ground snow drift
  const gd=ctx.createLinearGradient(0,VH-30,0,VH);
  gd.addColorStop(0,'rgba(200,220,255,.75)'); gd.addColorStop(1,'rgba(210,228,255,1)');
  ctx.fillStyle=gd;
  ctx.beginPath(); ctx.ellipse(VW/2,VH+4,VW*.7,38,0,0,Math.PI*2); ctx.fill();
}

function drawSnow() {
  [...SNOW_BG,...SNOW_FG].forEach(s=>{
    s.y+=s.speed; s.x+=s.drift;
    if(s.y>VH+4){ s.y=-4; s.x=Math.random()*VW; }
    if(s.x>VW) s.x=0; if(s.x<0) s.x=VW;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(210,228,255,${s.a})`; ctx.fill();
  });
}

// ── light string ──────────────────────────────────────────────
function drawLights() {
  const now=performance.now()/1000;
  // string
  ctx.strokeStyle='rgba(80,60,30,.6)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  LIGHTS.forEach((l,i)=>{
    const y=24+Math.sin(i*.8)*.5; // slight droop
    i===0?ctx.moveTo(l.x,y):ctx.lineTo(l.x,y);
  }); ctx.stroke();

  LIGHTS.forEach((l,i)=>{
    const twink=.5+.5*Math.sin(now*2.2+l.phase);
    const pulse = beatPulse > 0 ? 1 + beatPulse * 0.7 : 1; // scale up on beat
    const r = 5 * pulse;
    ctx.beginPath(); ctx.arc(l.x,24+Math.sin(i*.8)*.5,r,0,Math.PI*2);
    ctx.fillStyle=l.color; ctx.shadowColor=l.color; ctx.shadowBlur=(twink+beatPulse)*18;
    ctx.fill(); ctx.shadowBlur=0;
  });
}

// ── tree ───────────────────────────────────────────────────────
function drawTree(lit=false) {
  const now=performance.now()/1000;

  TREE_LAYERS.forEach(L=>{
    const g=ctx.createLinearGradient(TCX-L.hw,0,TCX+L.hw,0);
    if(lit){ g.addColorStop(0,'#1a6832'); g.addColorStop(.5,'#28a04c'); g.addColorStop(1,'#1a6832'); }
    else    { g.addColorStop(0,'#0d3318'); g.addColorStop(.5,'#195c30'); g.addColorStop(1,'#0d3318'); }
    ctx.beginPath(); ctx.moveTo(TCX,L.py);
    ctx.lineTo(TCX-L.hw,L.by); ctx.lineTo(TCX+L.hw,L.by); ctx.closePath();
    ctx.fillStyle=g; ctx.shadowColor=lit?'#28a04c':'transparent'; ctx.shadowBlur=lit?20:0;
    ctx.fill(); ctx.shadowBlur=0;
    ctx.strokeStyle=lit?'#3ec460':'#091b0e'; ctx.lineWidth=1.5; ctx.stroke();
  });

  // trunk
  ctx.fillStyle='#5c3112'; ctx.fillRect(TCX-13,460,26,60);

  // top star
  const starLit=catchTotal>=TARGET;
  starPath(TCX,TREE_LAYERS[0].py-18,22,9,5,starLit?now*.8:0);
  ctx.fillStyle=starLit?'#ffd700':'#6a5200'; ctx.shadowColor='#ffd700';
  ctx.shadowBlur=starLit?25:0; ctx.fill(); ctx.shadowBlur=0;

  // placed ornaments
  SLOTS.forEach((sl,i)=>{
    if(!sl.color)return;
    const g2=ctx.createRadialGradient(sl.x-2,sl.y-2,1,sl.x,sl.y,8);
    g2.addColorStop(0,lighten(sl.color,55)); g2.addColorStop(1,sl.color);
    ctx.beginPath(); ctx.arc(sl.x,sl.y,8,0,Math.PI*2);
    ctx.fillStyle=g2; ctx.shadowColor=sl.color; ctx.shadowBlur=lit?16:9;
    ctx.fill(); ctx.shadowBlur=0;
    if(lit){
      const tw=.3+.7*Math.abs(Math.sin(now*2+i*.7));
      ctx.beginPath(); ctx.arc(sl.x,sl.y,12,0,Math.PI*2);
      ctx.fillStyle=rgba(sl.color,tw*.22); ctx.fill();
    }
  });

  // festoon lights (when lit)
  if(lit){
    for(let i=0;i<12;i++){
      const t=now*1.8+i*.5, fc=ORB_COLORS[i%ORB_COLORS.length];
      const lx=TCX+Math.sin(i*1.5)*(35+i*8), ly=160+i*24;
      ctx.beginPath(); ctx.arc(lx,ly,4,0,Math.PI*2);
      ctx.fillStyle=fc; ctx.shadowColor=fc; ctx.shadowBlur=8+5*Math.abs(Math.sin(t));
      ctx.fill(); ctx.shadowBlur=0;
    }
  }
}

// ── player ─────────────────────────────────────────────────────
function drawPlayer() {
  const {x,y,w,h}=PLR;
  const g=ctx.createLinearGradient(x-w/2,y,x+w/2,y);
  g.addColorStop(0,'#a01430'); g.addColorStop(.5,'#e03040'); g.addColorStop(1,'#a01430');
  ctx.beginPath(); ctx.save();
  rr(x-w/2,y-h/2,w,h,[w/2,w/2,10,10]);
  ctx.fillStyle=g; ctx.shadowColor='rgba(230,50,70,.5)'; ctx.shadowBlur=18; ctx.fill();
  ctx.strokeStyle='rgba(255,215,0,.4)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.shadowBlur=0;
  // ribbon bow
  ctx.fillStyle='#ffd700';
  ctx.beginPath(); ctx.ellipse(x,y-h/2+9,12,7,0,0,Math.PI*2); ctx.fill();
  // shine
  ctx.beginPath(); rr(x-w/2+5,y-h/2+5,w-10,h/3,[w/2-5,w/2-5,3,3]);
  ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fill();
  ctx.restore();
}

// ── HUD ───────────────────────────────────────────────────────
function drawHUD() {

// ── sparkles ──────────────────────────────────────────────────
function burst(x,y,color,n=14) {
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i, sp=2+Math.random()*3.5;
    sparkles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color});
  }
}
function tickSparkles() {
  sparkles=sparkles.filter(e=>e.life>0);
  sparkles.forEach(e=>{
    e.x+=e.vx; e.y+=e.vy; e.vy+=.1; e.life-=.04;
    ctx.beginPath(); ctx.arc(e.x,e.y,4,0,Math.PI*2);
    ctx.fillStyle=rgba(e.color,e.life); ctx.shadowColor=e.color; ctx.shadowBlur=8;
    ctx.fill(); ctx.shadowBlur=0;
  });
}

// ── confetti ──────────────────────────────────────────────────
function initConfetti() {
  confetti=Array.from({length:70},()=>({
    x:Math.random()*VW, y:-20-Math.random()*80,
    vx:(Math.random()-.5)*4, vy:2+Math.random()*2,
    r:4+Math.random()*6, rot:Math.random()*Math.PI*2, spin:(Math.random()-.5)*.2,
    color:ORB_COLORS[Math.floor(Math.random()*ORB_COLORS.length)],
  }));
}
function tickConfetti() {
  confetti.forEach(c=>{
    c.x+=c.vx; c.y+=c.vy; c.rot+=c.spin;
    if(c.y>VH+20) c.y=-20;
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.fillStyle=c.color; ctx.fillRect(-c.r/2,-c.r/4,c.r,c.r/2);
    ctx.restore();
  });
}

// ── stat reveal ────────────────────────────────────────────────
function triggerStat(idx) {
  statCard={visible:true,idx,timer:0,phase:'in'};
}
function tickStatCard() {
  if(!statCard.visible) return;
  const HOLD=2.8, FADE=.35;
  statCard.timer += 1/60;

  let alpha;
  if(statCard.phase==='in'){
    alpha=statCard.timer/FADE;
    if(statCard.timer>=FADE){ statCard.phase='hold'; statCard.timer=0; alpha=1; }
  } else if(statCard.phase==='hold'){
    alpha=1;
    if(statCard.timer>=HOLD){ statCard.phase='out'; statCard.timer=0; }
  } else {
    alpha=1-statCard.timer/FADE;
    if(statCard.timer>=FADE){ statCard.visible=false; return; }
  }

  const s=STATS[statCard.idx];
  const cx=VW/2, cy=VH*.48;
  const w=320, h=180;

  ctx.save(); ctx.globalAlpha=Math.min(1,alpha);

  // backdrop
  ctx.beginPath(); rr(cx-w/2,cy-h/2,w,h,16);
  ctx.fillStyle=`rgba(6,14,6,.92)`; ctx.fill();
  ctx.strokeStyle=s.color; ctx.lineWidth=2;
  ctx.shadowColor=s.color; ctx.shadowBlur=20; ctx.stroke(); ctx.shadowBlur=0;

  // emoji
  ctx.font='42px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(s.icon, cx, cy-h/2+44);

  // number
  ctx.font=`bold 34px 'Cinzel Decorative',serif`;
  ctx.fillStyle=s.color; ctx.shadowColor=s.color; ctx.shadowBlur=12;
  ctx.textBaseline='alphabetic';
  ctx.fillText(s.num, cx, cy+8); ctx.shadowBlur=0;

  // lines
  ctx.font=`14px 'IM Fell English',Georgia,serif`;
  ctx.fillStyle='rgba(240,230,200,.9)';
  ctx.fillText(s.line1, cx, cy+30);
  ctx.fillText(s.line2, cx, cy+48);

  // progress dots
  const total=STATS.length, dotR=6, spacing=22;
  const startX=cx-(total-1)*spacing/2;
  for(let i=0;i<total;i++){
    ctx.beginPath(); ctx.arc(startX+i*spacing,cy+h/2-18,dotR,0,Math.PI*2);
    ctx.fillStyle=i<=statCard.idx?s.color:'rgba(255,255,255,.2)'; ctx.fill();
  }

  ctx.restore();
}

// ── game screen ───────────────────────────────────────────────
function drawPlay() {
  drawBG(); drawSnow(); drawTree(false); drawLights();

  // check song time for level transitions
  if(musicGoing && !statCard.visible) {
    const ct=music.currentTime;
    if(nextStatIdx < STATS.length && ct >= LEVEL_TIMES[nextStatIdx]) {
      triggerStat(nextStatIdx);
      levelNum = nextStatIdx + 1;
      nextStatIdx++;
    }
  }

  // spawn — beat-driven + fallback timer
  const cfg = LEVEL_CONFIG[Math.min(levelNum, LEVEL_CONFIG.length-1)];
  const beat = checkBeat();
  if (beat && orbs.length < cfg.maxOrbs) { spawnOrb(); fallbackSpawnTick = 0; }
  fallbackSpawnTick++;
  if (fallbackSpawnTick > cfg.interval * 2) { spawnOrb(); fallbackSpawnTick = 0; } // safety net

  // beat pulse overlay — subtle flash on kick
  if (beatPulse > 0.01) {
    ctx.fillStyle = `rgba(255,230,160,${beatPulse * 0.06})`;
    ctx.fillRect(0, 0, VW, VH);
  }

  // move player
  if(touchX !== null){
    const target = Math.max(PLR.w/2, Math.min(VW-PLR.w/2, touchX));
    PLR.x += (target-PLR.x)*.22; // smooth follow
  } else {
    if(keys.left)  PLR.x=Math.max(PLR.w/2,    PLR.x-PLR.speed);
    if(keys.right) PLR.x=Math.min(VW-PLR.w/2, PLR.x+PLR.speed);
  }

  // move & collide orbs
  orbs=orbs.filter(o=>{
    o.y+=o.speed; o.ang+=o.spin;
    const caught = o.y+o.r>=PLR.y-PLR.h/2 && o.y-o.r<=PLR.y+PLR.h/2
                && o.x>=PLR.x-PLR.w/2-o.r  && o.x<=PLR.x+PLR.w/2+o.r;
    if(caught){
      burst(o.x,o.y,o.color);
      if(catchTotal<TARGET){ const sl=SLOTS[catchTotal]; if(sl) sl.color=o.color; }
      catchTotal++;
      return false;
    }
    if(o.y>VH+30){
      lives--;
      if(lives<=0){
        if(catchTotal > highScore){
          highScore=catchTotal;
          localStorage.setItem('choinka_hs',String(catchTotal));
          isNewRecord=true;
        }
        state=S.LOSE;
      }
      return false;
    }
    return true;
  });

  orbs.forEach(drawOrb);
  tickSparkles();

  // player bounces on beat
  if (beatPulse > 0) {
    const bounce = Math.sin(beatPulse * Math.PI) * 5;
    ctx.save();
    ctx.translate(0, -bounce);
    drawPlayer();
    ctx.restore();
  } else {
    drawPlayer();
  }
  drawHUD();
  tickStatCard();
}

function spawnOrb() {
  const cfg = LEVEL_CONFIG[Math.min(levelNum, LEVEL_CONFIG.length-1)];
  if(orbs.length >= cfg.maxOrbs) return;
  orbs.push({
    x: 30+Math.random()*(VW-60),
    y: -28,
    r: 16+Math.random()*9,
    speed: cfg.baseSpeed + Math.random()*cfg.randSpeed,
    color: ORB_COLORS[Math.floor(Math.random()*ORB_COLORS.length)],
    type:  ORB_TYPES [Math.floor(Math.random()*ORB_TYPES.length)],
    ang: Math.random()*Math.PI*2,
    spin:(Math.random()-.5)*.08,
  });
}

//  MAIN LOOP
// ══════════════════════════════════════════════════════════
function loop() {
  ctx.clearRect(0,0,VW,VH);
  ctx.textBaseline='alphabetic';
  switch(state){
    case S.START: drawStart(); break;
    case S.PLAY:  drawPlay();  break;
    case S.WIN:   drawWin();   break;
    case S.LOSE:  drawLose();  break;
  }
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
